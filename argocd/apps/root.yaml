apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-local-root
  namespace: argocd
spec:
  project: infra-local
  source:
    repoURL: https://github.com/pawoo0211/exit-asset-infra.git
    targetRevision: main
    path: argocd/apps/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
