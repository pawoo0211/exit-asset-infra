apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: infra-local
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: harbor-core
      namespace: harbor
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: harbor-jobservice
      namespace: harbor
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: harbor-registry
      namespace: harbor
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: harbor-registry-htpasswd
      namespace: harbor
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      name: harbor-core
      namespace: harbor
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/livenessProbe
        - /spec/template/spec/containers/0/readinessProbe
        - /spec/template/spec/containers/0/startupProbe
    - group: apps
      kind: Deployment
      name: harbor-jobservice
      namespace: harbor
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/livenessProbe
        - /spec/template/spec/containers/0/readinessProbe
    - group: apps
      kind: Deployment
      name: harbor-registry
      namespace: harbor
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: apps
      kind: StatefulSet
      name: harbor-database
      namespace: harbor
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/livenessProbe
        - /spec/template/spec/containers/0/readinessProbe
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.18.3
    helm:
      values: |
        expose:
          type: clusterIP
          tls:
            enabled: false
        externalURL: http://localhost:18443
        harborAdminPassword: Harbor12345
        persistence:
          enabled: false
        trivy:
          enabled: false
        notary:
          enabled: false
        secretKey: harborlocalkey123
        core:
          secret: harbor-core-secret-local-2026
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            enabled: true
            initialDelaySeconds: 120
          initContainers:
            - name: wait-for-harbor-db
              image: busybox:1.36
              command:
                - sh
                - -c
                - until nc -z harbor-database 5432; do echo waiting for harbor-database; sleep 2; done
        jobservice:
          secret: harbor-jobservice-secret-local-2026
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          initContainers:
            - name: wait-for-harbor-core
              image: busybox:1.36
              command:
                - sh
                - -c
                - until wget -qO- http://harbor-core:80/api/v2.0/ping >/dev/null 2>&1; do echo waiting for harbor-core; sleep 2; done
        registry:
          secret: harbor-registry-secret-local-2026
          credentials:
            htpasswdString: 'harbor_registry_user:$apr1$local123$Hx7BR3e2HCXGywBaXtXqZ0'
        database:
          type: internal
          internal:
            readinessProbe:
              initialDelaySeconds: 30
              timeoutSeconds: 20
              periodSeconds: 15
              failureThreshold: 10
            livenessProbe:
              initialDelaySeconds: 180
              timeoutSeconds: 20
              periodSeconds: 20
              failureThreshold: 10
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
