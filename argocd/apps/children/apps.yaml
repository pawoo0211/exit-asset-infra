apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-operator
  namespace: argocd
spec:
  project: infra-local
  source:
    repoURL: https://kubeflow.github.io/spark-operator
    chart: spark-operator
    targetRevision: 2.5.0
    helm:
      skipCrds: true
      parameters:
        - name: spark.jobNamespaces[0]
          value: spark
        - name: webhook.enable
          value: "false"
        - name: controller.leaderElection.enable
          value: "false"
        - name: controller.workers
          value: "2"
        - name: controller.resources.requests.cpu
          value: 300m
        - name: controller.resources.requests.memory
          value: 512Mi
        - name: controller.resources.limits.cpu
          value: "1"
        - name: controller.resources.limits.memory
          value: 1Gi
        - name: webhook.leaderElection.enable
          value: "false"
        - name: spark.serviceAccount.create
          value: "false"
        - name: spark.serviceAccount.name
          value: spark
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
