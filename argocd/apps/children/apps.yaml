apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: starrocks-cluster
  namespace: argocd
spec:
  project: infra-local
  source:
    repoURL: https://starrocks.github.io/starrocks-kubernetes-operator
    chart: starrocks
    targetRevision: 1.11.4
    helm:
      values: |
        starrocksFESpec:
          replicas: 1
          hostType: IP
          feEnvVars:
            - name: HOST_TYPE
              value: IP
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          storageSpec:
            name: fe
            storageClassName: local-path
            storageSize: 10Gi
            logStorageClassName: local-path
            logStorageSize: 5Gi
        starrocksBeSpec:
          replicas: 0
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 2Gi
          storageSpec:
            name: be
            storageClassName: local-path
            storageSize: 20Gi
            logStorageClassName: local-path
            logStorageSize: 5Gi
        starrocksCnSpec:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: starrocks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
