apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-hadoop-config
data:
  core-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://192.168.5.2:9000</value>
      </property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>dfs.client.use.datanode.hostname</name>
        <value>true</value>
      </property>
      <property>
        <name>dfs.namenode.rpc-address</name>
        <value>192.168.5.2:9000</value>
      </property>
      <property>
        <name>dfs.namenode.http-address</name>
        <value>192.168.5.2:9870</value>
      </property>
    </configuration>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hive-metastore-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
        - name: hive-metastore
          image: apache/hive:4.0.0
          env:
            - name: SERVICE_NAME
              value: metastore
            - name: DB_DRIVER
              value: derby
            - name: SERVICE_OPTS
              value: >-
                -Dmetastore.warehouse.dir=hdfs://192.168.5.2:9000/user/hive/warehouse
          ports:
            - containerPort: 9083
              name: thrift
          volumeMounts:
            - name: hive-data
              mountPath: /opt/hive/data
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              subPath: hdfs-site.xml
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 3Gi
      volumes:
        - name: hive-data
          persistentVolumeClaim:
            claimName: hive-metastore-data
        - name: hadoop-config
          configMap:
            name: hive-hadoop-config
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
spec:
  selector:
    app: hive-metastore
  ports:
    - name: thrift
      port: 9083
      targetPort: 9083
  type: ClusterIP
