apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-history-config
data:
  spark-defaults.conf: |
    spark.hadoop.fs.defaultFS hdfs://192.168.5.2:9000
    spark.history.fs.logDirectory hdfs://192.168.5.2:9000/spark-history
    spark.history.provider org.apache.spark.deploy.history.FsHistoryProvider
    spark.history.ui.port 18080
    spark.history.retainedApplications 50
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      containers:
        - name: spark-history-server
          image: apache/spark:4.0.2
          command:
            - /bin/bash
            - -lc
            - /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            - name: HADOOP_USER_NAME
              value: spark
            - name: SPARK_USER
              value: spark
            - name: USER
              value: spark
            - name: HADOOP_CONF_DIR
              value: /etc/hadoop-conf
            - name: SPARK_HISTORY_OPTS
              value: >-
                -Dspark.hadoop.fs.defaultFS=hdfs://192.168.5.2:9000
                -Dspark.history.fs.logDirectory=hdfs://192.168.5.2:9000/spark-history
          ports:
            - containerPort: 18080
              name: http
          volumeMounts:
            - name: spark-defaults
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
            - name: hadoop-config
              mountPath: /etc/hadoop-conf
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
      volumes:
        - name: spark-defaults
          configMap:
            name: spark-history-config
        - name: hadoop-config
          configMap:
            name: hadoop-client-config
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
spec:
  selector:
    app: spark-history-server
  ports:
    - name: http
      port: 18080
      targetPort: 18080
  type: ClusterIP
