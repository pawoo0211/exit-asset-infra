apiVersion: v1
kind: ConfigMap
metadata:
  name: hadoop-client-config
data:
  core-site.xml: |
    <?xml version="1.0"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://192.168.5.2:9000</value>
      </property>
      <property>
        <name>hadoop.security.authentication</name>
        <value>simple</value>
      </property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>dfs.client.use.datanode.hostname</name>
        <value>true</value>
      </property>
      <property>
        <name>dfs.namenode.rpc-address</name>
        <value>192.168.5.2:9000</value>
      </property>
      <property>
        <name>dfs.namenode.http-address</name>
        <value>192.168.5.2:9870</value>
      </property>
    </configuration>
