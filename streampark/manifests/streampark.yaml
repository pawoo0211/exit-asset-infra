apiVersion: apps/v1
kind: Deployment
metadata:
  name: streampark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streampark
  template:
    metadata:
      labels:
        app: streampark
    spec:
      containers:
        - name: streampark
          image: apache/streampark:latest
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx768m"
          ports:
            - containerPort: 10000
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: streampark
spec:
  selector:
    app: streampark
  ports:
    - name: http
      port: 10000
      targetPort: 10000
  type: ClusterIP
