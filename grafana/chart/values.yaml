grafana:
  adminUser: admin
  adminPassword: admin1234

  service:
    type: ClusterIP
    port: 80

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-local-server.prometheus.svc.cluster.local
          isDefault: true
