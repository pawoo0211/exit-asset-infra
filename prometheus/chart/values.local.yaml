prometheus:
  configmapReload:
    prometheus:
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 10
      readinessProbe:
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 10

  server:
    readinessProbeInitialDelay: 60
    readinessProbePeriodSeconds: 10
    readinessProbeTimeout: 10
    readinessProbeFailureThreshold: 12
    livenessProbeInitialDelay: 120
    livenessProbePeriodSeconds: 20
    livenessProbeTimeout: 10
    livenessProbeFailureThreshold: 12
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 3Gi
    persistentVolume:
      size: 8Gi
