apiVersion: apps/v1
kind: Deployment
metadata:
  name: nessie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nessie
  template:
    metadata:
      labels:
        app: nessie
    spec:
      containers:
        - name: nessie
          image: ghcr.io/projectnessie/nessie:0.103.1
          env:
            - name: QUARKUS_HTTP_PORT
              value: "19120"
            - name: NESSIE_VERSION_STORE_TYPE
              value: IN_MEMORY
          ports:
            - containerPort: 19120
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nessie
spec:
  selector:
    app: nessie
  ports:
    - name: http
      port: 19120
      targetPort: 19120
  type: ClusterIP
