apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: kafka-local-pool
  labels:
    strimzi.io/cluster: kafka-local
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-local
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.1.1
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1
        memory: 1536Mi
    jvmOptions:
      -Xms: 128m
      -Xmx: 512m
    livenessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 10
    readinessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 10
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: true
